<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<title>Masuk · muurah.com Admin</title>
<meta name="viewport" content="width=1440">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: light only; }
  html, body {
    margin: 0; padding: 0;
    background: #F5F3FF; color: #1A1228;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  * { box-sizing: border-box; }
  button, input, select { font-family: inherit; }
  input::placeholder { color: #9085AE; }
  body { min-width: 1440px; }

  @keyframes muurah-fade   { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes muurah-spin   { to { transform: rotate(360deg); } }
  @keyframes muurah-pop    { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes muurah-pulse  { 0%, 100% { box-shadow: 0 0 0 0 rgba(74,45,140,0.45); } 50% { box-shadow: 0 0 0 6px rgba(74,45,140,0); } }
  @keyframes muurah-bg     { from { background-position: 0 0; } to { background-position: 60px 60px; } }
  .muurah-spin { animation: muurah-spin 0.8s linear infinite; }
  .muurah-step { animation: muurah-fade 280ms cubic-bezier(0.32, 0.72, 0, 1); }
</style>
</head>
<body>
<div id="login-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="login.jsx"></script>
</body>
</html>
