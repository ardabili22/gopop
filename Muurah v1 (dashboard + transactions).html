<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<title>muurah.com · Admin Dashboard</title>
<meta name="viewport" content="width=1440">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: light only;
  }
  html, body {
    margin: 0; padding: 0;
    background: #F5F3FF;
    color: #1A1228;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  input, select { font-family: inherit; }
  input::placeholder { color: #9085AE; }

  /* Spinner */
  .muurah-spin { animation: muurah-spin 0.8s linear infinite; }
  @keyframes muurah-spin { to { transform: rotate(360deg); } }

  /* Drawer animations */
  @keyframes muurah-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes muurah-slide { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: #E0D9F5; border-radius: 6px;
    border: 2px solid #F5F3FF; background-clip: content-box;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #C5B8EF; border: 2px solid #F5F3FF; background-clip: content-box;
  }

  /* Select native arrow off */
  select { background-image: none !important; }

  body { min-width: 1440px; }
</style>
</head>
<body>
<div id="app-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="v1/data.js"></script>
<script type="text/babel" src="v1/icons.jsx"></script>
<script type="text/babel" src="v1/components.jsx"></script>
<script type="text/babel" src="v1/dashboard.jsx"></script>
<script type="text/babel" src="v1/transactions.jsx"></script>
<script type="text/babel" src="v1/tweaks-panel.jsx"></script>
<script type="text/babel" src="v1/app.jsx"></script>
</body>
</html>
